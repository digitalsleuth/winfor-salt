# This workflow should download the latest Hex Editor Neo installer,
# and compare the previous hash with the current hash. 

name: check-neo-hash

on:
  schedule:
      - cron: "0 0 * * *"
  
  workflow_dispatch:
 
jobs:
  neo_hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Check Hex Editor Neo Hash
        run: |
          wget https://www.hhdsoftware.com/download/free-hex-editor-neo.exe
          PREVIOUS_HASH=$(cat /home/runner/work/winfor-salt/winfor-salt/winfor/downloads/packages/free-hex-editor-neo.sls | grep "set hash" | awk -F\' '{print tolower($2)}')
          CURRENT_HASH=$(sha256sum free-hex-editor-neo.exe | awk '{print $1}')
          if [[ "$PREVIOUS_HASH" != "$CURRENT_HASH" ]]; then echo "HASH UPDATED - $CURRENT_HASH" && exit 1; else echo "No hash changes" && exit 0; fi
